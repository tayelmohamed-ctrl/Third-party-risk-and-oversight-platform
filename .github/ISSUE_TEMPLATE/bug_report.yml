name: Bug report
description: Report incorrect behaviour in FinCrime OS or partner stack
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Include steps to reproduce and expected vs actual behaviour.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - FinCrime OS (cram-app)
        - CRAM scoring engine
        - Transaction monitoring
        - Partner Oversight / TPRO backend
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to /transaction-monitoring ..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: Branch / commit
      placeholder: main @ abc1234
    validations:
      required: false
